# Copy to config.yml (or pass --config=/path/to/config.yml).
# These values are generated by the panel when you create a node
# (`php artisan stratohost:node:create`) - do not hand-write the token.

uuid: "00000000-0000-0000-0000-000000000000"
panel_url: "https://panel.example.com"

api:
  host: "0.0.0.0"
  port: 8080
  ssl:
    enabled: false
    cert: ""
    key: ""

auth:
  token_id: ""
  token: ""

docker:
  socket: "unix:///var/run/docker.sock"

data_dir: "/var/lib/stratohost"
